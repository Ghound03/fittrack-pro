{% extends "base.html" %}

{% block title %}
Contact
{% endblock %}

{% block content %}

<section class="page-section">

    <h1>Contact Us</h1>

    <form
        method="POST"
        id="contactForm"
        class="contact-form"
    >

        <input
            type="text"
            name="name"
            id="name"
            placeholder="Your Name"
            required
        >

        <input
            type="email"
            name="email"
            id="email"
            placeholder="Email Address"
            required
        >

        <textarea
            name="message"
            id="message"
            rows="6"
            placeholder="Your Message"
            required
        ></textarea>

        <button type="submit">
            Send Message
        </button>

    </form>

</section>

{% endblock %}
