{% extends "base.html" %}

{% block title %}Goals{% endblock %}

{% block content %}

<section class="page-section">

    <h1>Fitness Goals</h1>

    <div class="card-grid">

        {% for goal in goals %}

        <div class="card">

            <h2>{{ goal.goal }}</h2>

            <p>{{ goal.status }}</p>

        </div>

        {% endfor %}

    </div>

</section>

{% endblock %}
